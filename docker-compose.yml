version: "3.9"

services:
  mediamtx:
    image: bluenviron/mediamtx:1
    container_name: mediamtx
    environment:
      MTX_RTSPTRANSPORTS: tcp
      MTX_WEBRTCADDITIONALHOSTS: 127.0.0.1
    ports:
      - "8554:8554"
      - "1935:1935"
      - "8888:8888"
      - "8889:8889"
      - "8890:8890/udp"
      - "8189:8189/udp"
    volumes:
      - ./mediamtx.yml:/mediamtx.yml